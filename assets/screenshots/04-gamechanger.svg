<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="GameChanger schedule and stats screenshot preview">
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#02050b"/><stop offset="1" stop-color="#06162f"/></linearGradient><linearGradient id="blue" x1="0" x2="1"><stop stop-color="#1677ff"/><stop offset="1" stop-color="#66b4ff"/></linearGradient></defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <text x="355" y="105" fill="#66b4ff" font-family="Arial Black" font-size="25" letter-spacing="5">GAMECHANGER READY</text>
  <text x="260" y="195" fill="#fff" font-family="Arial Black" font-size="76">SCHEDULE + STATS</text>
  <rect x="90" y="285" width="1020" height="170" rx="24" fill="#071021" stroke="#1f5fff"/>
  <text x="140" y="345" fill="#fff" font-family="Arial Black" font-size="34">Upcoming Game</text><text x="140" y="395" fill="#aab4ca" font-family="Arial" font-size="26">Opponent · Field · Time · GameChanger source link</text>
  <rect x="90" y="505" width="1020" height="240" rx="24" fill="#071021" stroke="#1f5fff"/>
  <rect x="125" y="550" width="950" height="48" fill="url(#blue)" rx="10"/>
  <g fill="#fff" font-family="Arial Black" font-size="20"><text x="155" y="582">PLAYER</text><text x="350" y="582">AVG</text><text x="495" y="582">OBP</text><text x="640" y="582">OPS</text><text x="785" y="582">RBI</text><text x="930" y="582">SB</text></g>
  <g fill="#dce6ff" font-family="Arial" font-size="22"><text x="155" y="650">Athlete One</text><text x="350" y="650">---</text><text x="495" y="650">---</text><text x="640" y="650">---</text><text x="785" y="650">---</text><text x="930" y="650">---</text></g>
  <text x="390" y="820" fill="#66b4ff" font-family="Arial Black" font-size="28">GC SCHEDULE + STAT PANELS</text>
</svg>